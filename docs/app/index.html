<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arenda — Объявления</title>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
      --accent: #6c63ff; --accent2: #00d4aa; --text: #e2e8f0; --muted: #8892a4; --badge: #252838;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav { position: sticky; top: 0; z-index: 100; background: rgba(15,17,23,.95); backdrop-filter: blur(10px);
          border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center;
          justify-content: space-between; height: 52px; }
    .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-decoration: none; }
    .nav-right { display: flex; gap: 1rem; align-items: center; }
    .nav-right a { color: var(--muted); text-decoration: none; font-size: .88rem; }
    .nav-right a:hover { color: var(--text); }

    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    /* FILTERS */
    .filters { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
               padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; display: flex; gap: .8rem; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: .3rem; min-width: 120px; }
    .filter-group label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .filter-group input, .filter-group select {
      background: var(--badge); border: 1px solid var(--border); color: var(--text);
      padding: .4rem .7rem; border-radius: 6px; font-size: .88rem; outline: none;
      transition: border-color .2s;
    }
    .filter-group input:focus, .filter-group select:focus { border-color: var(--accent); }
    .filter-group input { width: 120px; }
    .btn-search { background: var(--accent); color: #fff; border: none; padding: .45rem 1.2rem;
                  border-radius: 6px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: background .2s;
                  align-self: flex-end; }
    .btn-search:hover { background: #5a52d5; }
    .btn-reset { background: transparent; color: var(--muted); border: 1px solid var(--border);
                 padding: .45rem .9rem; border-radius: 6px; font-size: .88rem; cursor: pointer;
                 transition: all .2s; align-self: flex-end; }
    .btn-reset:hover { color: var(--text); border-color: var(--text); }

    /* STATS BAR */
    .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;
                 font-size: .88rem; color: var(--muted); flex-wrap: wrap; gap: .5rem; }
    .stats-bar strong { color: var(--accent2); }

    /* SORT */
    .sort-select { background: var(--badge); border: 1px solid var(--border); color: var(--text);
                   padding: .3rem .7rem; border-radius: 6px; font-size: .85rem; outline: none; }

    /* GRID */
    .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }

    .listing-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
                    overflow: hidden; transition: border-color .2s, transform .2s; cursor: pointer; }
    .listing-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .card-img { width: 100%; height: 180px; object-fit: cover; background: var(--badge);
                display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-img.no-photo { background: var(--badge); }

    .card-body { padding: 1rem; }
    .card-price { font-size: 1.2rem; font-weight: 700; color: var(--accent2); margin-bottom: .3rem; }
    .card-title { font-size: .9rem; font-weight: 600; margin-bottom: .3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-address { font-size: .82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .7rem; }
    .card-meta { display: flex; gap: .5rem; flex-wrap: wrap; }
    .badge { background: var(--badge); border: 1px solid var(--border); padding: .15rem .5rem;
             border-radius: 4px; font-size: .75rem; color: var(--muted); }
    .badge.source { color: var(--accent); border-color: var(--accent); }
    .card-footer { padding: .6rem 1rem; border-top: 1px solid var(--border);
                   display: flex; justify-content: space-between; align-items: center; }
    .card-date { font-size: .75rem; color: var(--muted); }
    .card-link { font-size: .78rem; color: var(--accent); text-decoration: none; }
    .card-link:hover { text-decoration: underline; }

    /* PAGINATION */
    .pagination { display: flex; justify-content: center; align-items: center; gap: .5rem;
                  margin-top: 2rem; padding-bottom: 2rem; flex-wrap: wrap; }
    .page-btn { background: var(--card); border: 1px solid var(--border); color: var(--text);
                padding: .4rem .8rem; border-radius: 6px; font-size: .88rem; cursor: pointer;
                transition: all .15s; min-width: 36px; text-align: center; }
    .page-btn:hover:not(.active):not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .page-btn:disabled { opacity: .3; cursor: default; }

    /* EMPTY / LOADING */
    .state-box { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .state-box .icon { font-size: 3rem; margin-bottom: 1rem; }
    .state-box p { font-size: 1rem; }
    .state-box small { font-size: .82rem; margin-top: .5rem; display: block; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent);
               border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">🏠 arenda</a>
  <div class="nav-right">
    <a href="https://joshixap.github.io/arenda/" target="_blank">О проекте ↗</a>
    <a href="https://github.com/joshixap/arenda" target="_blank">GitHub ↗</a>
  </div>
</nav>

<div class="container">
  <div class="filters">
    <div class="filter-group" style="min-width:160px">
      <label>Поиск</label>
      <input type="text" id="q" placeholder="Студия, метро...">
    </div>
    <div class="filter-group">
      <label>Город</label>
      <input type="text" id="city" placeholder="Москва">
    </div>
    <div class="filter-group">
      <label>Комнат от</label>
      <input type="number" id="rooms_min" placeholder="1" min="1" max="10">
    </div>
    <div class="filter-group">
      <label>Комнат до</label>
      <input type="number" id="rooms_max" placeholder="3" min="1" max="10">
    </div>
    <div class="filter-group">
      <label>Цена от, ₽</label>
      <input type="number" id="price_min" placeholder="20000">
    </div>
    <div class="filter-group">
      <label>Цена до, ₽</label>
      <input type="number" id="price_max" placeholder="100000">
    </div>
    <div class="filter-group">
      <label>Площадь от</label>
      <input type="number" id="area_min" placeholder="30">
    </div>
    <div class="filter-group">
      <label>Источник</label>
      <select id="source">
        <option value="">Все</option>
        <option value="avito">avito.ru</option>
        <option value="cian">cian.ru</option>
        <option value="domclick">domclick.ru</option>
        <option value="yandex">yandex.ru</option>
        <option value="n1">n1.ru</option>
      </select>
    </div>
    <button class="btn-search" onclick="search(1)">Найти</button>
    <button class="btn-reset" onclick="resetFilters()">Сброс</button>
  </div>

  <div class="stats-bar">
    <div id="stats-text">Загрузка...</div>
    <select class="sort-select" id="sort" onchange="search(1)">
      <option value="date_desc">Сначала новые</option>
      <option value="date_asc">Сначала старые</option>
      <option value="price_asc">Цена ↑</option>
      <option value="price_desc">Цена ↓</option>
    </select>
  </div>

  <div id="listings-container">
    <div class="state-box"><div class="spinner"></div><p>Загрузка объявлений...</p></div>
  </div>

  <div id="pagination" class="pagination"></div>
</div>

<script>
  const API_BASE = '/api/listings/listings';
  const PAGE_SIZE = 20;
  let currentPage = 1;
  let totalPages = 0;

  function getFilters() {
    return {
      q: document.getElementById('q').value.trim(),
      city: document.getElementById('city').value.trim(),
      rooms_min: document.getElementById('rooms_min').value,
      rooms_max: document.getElementById('rooms_max').value,
      price_min: document.getElementById('price_min').value,
      price_max: document.getElementById('price_max').value,
      area_min: document.getElementById('area_min').value,
      source: document.getElementById('source').value,
      sort: document.getElementById('sort').value,
    };
  }

  function resetFilters() {
    ['q','city','rooms_min','rooms_max','price_min','price_max','area_min'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('source').value = '';
    document.getElementById('sort').value = 'date_desc';
    search(1);
  }

  async function search(page) {
    currentPage = page;
    const f = getFilters();
    const params = new URLSearchParams({ page, size: PAGE_SIZE, sort: f.sort });
    if (f.q) params.set('q', f.q);
    if (f.city) params.set('city', f.city);
    if (f.rooms_min) params.set('rooms_min', f.rooms_min);
    if (f.rooms_max) params.set('rooms_max', f.rooms_max);
    if (f.price_min) params.set('price_min', f.price_min);
    if (f.price_max) params.set('price_max', f.price_max);
    if (f.area_min) params.set('area_min', f.area_min);
    if (f.source) params.set('source', f.source);

    document.getElementById('listings-container').innerHTML =
      '<div class="state-box"><div class="spinner"></div><p>Загрузка...</p></div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('stats-text').textContent = 'Загрузка...';

    try {
      const resp = await fetch(`${API_BASE}?${params}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      renderListings(data);
    } catch (e) {
      document.getElementById('listings-container').innerHTML =
        `<div class="state-box"><div class="icon">⚠️</div><p>Ошибка загрузки</p><small>${e.message}</small></div>`;
      document.getElementById('stats-text').textContent = 'Ошибка';
    }
  }

  function renderListings(data) {
    totalPages = data.pages || 0;
    const total = data.total || 0;
    const items = data.items || [];

    document.getElementById('stats-text').innerHTML =
      total > 0
        ? `Найдено <strong>${total.toLocaleString('ru')}</strong> объявлений · страница ${data.page} из ${totalPages}`
        : 'Объявлений не найдено';

    if (!items.length) {
      document.getElementById('listings-container').innerHTML =
        `<div class="state-box">
          <div class="icon">🏠</div>
          <p>Объявлений пока нет</p>
          <small>Парсеры запускаются каждые 3 минуты. Для работы Avito и Cian нужен прокси.</small>
        </div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'listings-grid';

    items.forEach(item => {
      const photo = item.photos && item.photos[0];
      const rooms = item.rooms ? `${item.rooms}-комн.` : 'Студия';
      const area = item.area ? `${item.area} м²` : '';
      const floor = item.floor ? `${item.floor}/${item.total_floors || '?'} эт.` : '';
      const date = new Date(item.created_at).toLocaleDateString('ru', { day:'numeric', month:'short' });
      const seenOn = (item.seen_on || [item.source]).join(', ');

      grid.innerHTML += `
        <div class="listing-card" onclick="window.open('${item.source_url}','_blank')">
          <div class="card-img ${photo ? '' : 'no-photo'}">
            ${photo
              ? `<img src="${photo}" alt="${item.title}" loading="lazy" onerror="this.parentElement.innerHTML='🏠'">`
              : '🏠'}
          </div>
          <div class="card-body">
            <div class="card-price">${item.price.toLocaleString('ru')} ₽/мес</div>
            <div class="card-title">${item.title || `${rooms} квартира`}</div>
            <div class="card-address">📍 ${item.address || item.city}</div>
            <div class="card-meta">
              ${rooms ? `<span class="badge">${rooms}</span>` : ''}
              ${area ? `<span class="badge">${area}</span>` : ''}
              ${floor ? `<span class="badge">${floor}</span>` : ''}
              <span class="badge source">${item.source}</span>
            </div>
          </div>
          <div class="card-footer">
            <span class="card-date">📅 ${date}${seenOn !== item.source ? ` · видели на: ${seenOn}` : ''}</span>
            <a class="card-link" href="${item.source_url}" target="_blank" onclick="event.stopPropagation()">Открыть ↗</a>
          </div>
        </div>`;
    });

    document.getElementById('listings-container').innerHTML = '';
    document.getElementById('listings-container').appendChild(grid);
    renderPagination(data.page, totalPages);
  }

  function renderPagination(current, total) {
    if (total <= 1) return;
    const el = document.getElementById('pagination');
    el.innerHTML = '';

    const btn = (label, page, disabled, active) => {
      const b = document.createElement('button');
      b.className = 'page-btn' + (active ? ' active' : '');
      b.textContent = label;
      b.disabled = disabled;
      if (!disabled && !active) b.onclick = () => { search(page); window.scrollTo({top:0, behavior:'smooth'}); };
      return b;
    };

    el.appendChild(btn('←', current - 1, current === 1, false));

    const pages = [];
    if (total <= 7) {
      for (let i = 1; i <= total; i++) pages.push(i);
    } else {
      pages.push(1);
      if (current > 3) pages.push('…');
      for (let i = Math.max(2, current-1); i <= Math.min(total-1, current+1); i++) pages.push(i);
      if (current < total - 2) pages.push('…');
      pages.push(total);
    }

    pages.forEach(p => {
      if (p === '…') {
        const s = document.createElement('span');
        s.className = 'page-btn'; s.textContent = '…'; s.style.cursor = 'default';
        el.appendChild(s);
      } else {
        el.appendChild(btn(p, p, false, p === current));
      }
    });

    el.appendChild(btn('→', current + 1, current === total, false));
  }

  // Поиск по Enter
  document.querySelectorAll('.filters input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') search(1); });
  });

  search(1);
</script>

</body>
</html>
